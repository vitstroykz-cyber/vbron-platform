version: '3.8'

services:
  vbron-postgres:
    image: postgres:16-alpine
    container_name: vbron_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vbron
      POSTGRES_USER: vbron_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Almaty
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    networks:
      - vbron_internal

  vbron-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vbron_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGRES_HOST: vbron_postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: vbron
      POSTGRES_USER: vbron_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Almaty
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_DEFAULT_CHAT_ID: ${TELEGRAM_DEFAULT_CHAT_ID}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - vbron-postgres
    networks:
      - vbron_internal
      - proxy_default

  vbron-tenant-site:
    image: nginx:alpine
    container_name: vbron_tenant_site
    restart: unless-stopped
    volumes:
      - ./tenant-site:/usr/share/nginx/html:ro
    networks:
      - proxy_default
  vbron-admin:
    image: nginx:alpine
    container_name: vbron_admin
    restart: unless-stopped
    volumes:
      - ./admin:/usr/share/nginx/html:ro
    networks:
      - proxy_default

networks:
  vbron_internal:
    name: vbron_internal
    driver: bridge
  proxy_default:
    external: true
