server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Максимальный кэш браузера — файлы не меняются (уникальные имена)
    location / {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";

        # Только определённые типы файлов
        location ~* \.(jpg|jpeg|png|webp)$ {
            try_files $uri =404;
        }

        # Всё остальное — 404
        return 404;
    }

    # Скрытые файлы (dotfiles) — запрещаем
    location ~ /\. {
        deny all;
    }
}
